<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학교 플리마켓</title>

<style>
body { font-family: sans-serif; background:#f5f5f5; }
.container { max-width:500px; margin:auto; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
button { margin-top:5px; }
</style>

</head>

<body>

<div class="container">

<div id="loginBox" class="card">
  <input id="username" placeholder="이름 입력">
  <button onclick="login()">입장</button>
</div>

<div id="main" style="display:none;">

<div class="card">
  <h3 id="welcome"></h3>
  <input id="title" placeholder="상품명">
  <input id="price" placeholder="가격">
  <button onclick="addItem()">등록</button>
</div>

<div class="card">
  <h3>상품 목록</h3>
  <div id="items"></div>
</div>

<button onclick="logout()">로그아웃</button>

</div>

</div>

<script>

let user = localStorage.getItem("user");
let items = JSON.parse(localStorage.getItem("items")) || [];

// 로그인
function login(){
  const name = document.getElementById("username").value;
  if(!name) return alert("이름 입력하세요");
  
  localStorage.setItem("user", name);
  location.reload();
}

// 자동 로그인
if(user){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("welcome").innerText = user + "님 환영!";
  render();
}

// 로그아웃
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// 상품 등록
function addItem(){
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;

  if(!title || !price) return alert("다 입력하세요");

  const item = {
    id: Date.now(),
    title,
    price,
    user
  };

  items.push(item);
  localStorage.setItem("items", JSON.stringify(items));

  render();

  document.getElementById("title").value="";
  document.getElementById("price").value="";
}

// 삭제
function deleteItem(id){
  items = items.filter(i => i.id !== id);
  localStorage.setItem("items", JSON.stringify(items));
  render();
}

// 화면 출력
function render(){
  const box = document.getElementById("items");
  box.innerHTML = "";

  items.forEach(i=>{
    box.innerHTML += `
      <div class="card">
        <b>${i.title}</b>
        <p>${i.price}원</p>
        <small>${i.user}</small><br>
        <button onclick="deleteItem(${i.id})">삭제</button>
      </div>
    `;
  });
}

</script>

</body>
</html>
